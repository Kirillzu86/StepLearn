user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # 1. Включаем Gzip сжатие (сайт будет грузиться в 3-5 раз быстрее)
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream backend_upstream {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 2. Кэширование статики (картинки, шрифты и т.д. не будут грузиться каждый раз)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public";
        }

        # Прокси для API и Auth
        location ^~ /api/ {
            proxy_pass http://backend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 3. Настройка CORS (чтобы фронтенд мог свободно общаться с бэкендом)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location ^~ /auth/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            add_header 'Access-Control-Allow-Origin' '*' always;
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
            
            # 4. Отключаем кэширование для index.html, чтобы при обновлении сайта 
            # пользователи сразу видели новую версию, а не старую из кэша
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
