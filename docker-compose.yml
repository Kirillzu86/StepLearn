version: '3.8'

services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: Stepik
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: Stepik
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_PORT: 5432
    networks:
      - app-network

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: always
    depends_on:
      - backend
    # Порты убраны. В Coolify в поле Domains напиши http://твой_ip
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
